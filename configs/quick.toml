# Smoke-test configuration.
#
# Runs the no-Alamo benchmarks with minimal reps to verify the harness itself
# (CLI, preflight, topology, results writer) works on a new machine. Does NOT
# exercise the compile / regression / SCP / render path — use `validate.toml`
# for the end-to-end shakedown instead.
#
# Expected duration: under a minute on any machine.

[run]
mode = "quick"
output_dir = "results"
random_seed = 0

[statistics]
warmup_reps = 0
reps_short = 1
reps_long = 1
reps_noise_floor = 3
cooldown_seconds = 2

[preflight]
require_ac = false
require_governor = "any"
max_load_1min = 4.0
min_disk_free_gb = 5
max_uptime_days = 365

[alamo]
build_target = "tests/SCPSpheresElastic/input"
compiler = "clang++"
dims = [3]

[telemetry]
sample_interval_seconds = 1
require_sudo = false      # skip the sudo-gated samplers in quick mode

[benchmarks]
# noise_floor is the only runner here because anything Alamo-touching (compile,
# regression, scp_elastic, render) needs at least a few minutes per rep and is
# not "smoke test" material. Use validate.toml for a real Alamo-touching shake.
enabled = [
    "noise_floor",
]

# Stub sections present only because BenchmarksConfig fields are non-optional;
# unused at runtime since neither runner is enabled.
[benchmarks.scp_elastic]
extra_core_counts = []
stop_time = "0.0001_s"
dim = 2

[benchmarks.render]
codecs = ["gifski"]
frame_resolution = [640, 360]
fps = 15
