# Full overnight benchmark configuration.
#
# Designed for the canonical run that produces results comparable across machines.
# Override individual values via CLI flags or by passing a different config file.

[run]
mode = "full"
output_dir = "results"
random_seed = 0          # 0 = generate from os.urandom and record in run.config_json

[statistics]
warmup_reps = 1
reps_short = 5           # SCP at each core count, codec encodes, frame gen
reps_long = 2            # compile, full regression suite — kept low because
                         # regression-suite wall time is unpredictable across
                         # machines (estimated 30–90 min/rep) and dominates
                         # any "long" benchmark; 2 reps gives a min/max bracket
                         # without blowing the 12 h overnight budget.
reps_noise_floor = 20
cooldown_seconds = 30    # pause between reps to let thermals settle

[preflight]
require_ac = true
require_governor = "performance"      # linux only
require_macos_perf_mode = true        # High Power Mode on macOS
max_load_1min = 0.5
min_disk_free_gb = 50
max_uptime_days = 14

[alamo]
build_target = "tests/SCPSpheresElastic/input"
compiler = "clang++"           # Apple Clang on macOS, LLVM clang on Linux — both via $PATH
dims = [2, 3]                  # regression suite needs 2D and 3D binaries; SCP uses 3D

[telemetry]
sample_interval_seconds = 1
require_sudo = true

[benchmarks]
enabled = [
    "noise_floor",
    "compile_serial",
    "compile_parallel",
    "regression_suite",
    "scp_elastic",
    "render_frames",     # must precede render_encode — encoder reads the latest frames_rep* dir
    "render_encode",
]

[benchmarks.regression]
# Sub-tests skipped before invoking `./scripts/runtests.py`. Format:
# "<TestDir>.<section_name>" — must match a `#@ [section_name]` block inside
# alamo/tests/<TestDir>/input. The runner patches the input file at the start
# of every regression rep (the next compile rep's cold-cache wipes the patch
# via `git checkout -- .`, so we re-apply per rep).
#
# These 15 tests are known-failing on macOS (Apple Clang + M1 Pro fixture as
# of 2026-05-19): all are tolerance-bust style failures in the Voronoi /
# ThermoElastic 2D solvers. Linux runs would presumably pass them, but we
# skip globally to keep the wall-time signal clean and the cross-machine
# data comparable. If you want to UN-skip on Linux, override `skip_tests = []`
# in a Linux-specific config.
skip_tests = [
    # Flaky / intermittent on macOS — fails occasionally rather than every run.
    "FracturePFCZM.2d-serial-notch",
    # Tolerance-bust failures, Voronoi / ThermoElastic 2D family on macOS.
    "ThermoElastic.2d",
    "Voronoi.2D-100grain-parallel",
    "Voronoi.2D-100grain-serial",
    "VoronoiElastic.2d-serial",
    "VoronoiElastic.2d-parallel",
    "VoronoiElastic.2d-serial-restart",
    "VoronoiElastic.periodic-2d-serial",
    "VoronoiSimplePeriodic.2d-amr0-mg0-np1",
    "VoronoiSimplePeriodic.2d-amr2-mg0-np1",
    "VoronoiSimplePeriodic.2d-amr0-mga-np1",
    "VoronoiSimplePeriodic.2d-amr2-mga-np1",
    "VoronoiSimplePeriodic.2d-amr0-mg0-np4",
    "VoronoiSimplePeriodic.2d-amr2-mg0-np4",
    "VoronoiSimplePeriodic.2d-amr0-mga-np4",
    "VoronoiSimplePeriodic.2d-amr2-mga-np4",
]

[benchmarks.scp_elastic]
# Sweep is auto-generated as 1, 2, 4, 8, ..., physical, physical + virtual.
# Add explicit additional values here if needed.
extra_core_counts = []
# Simulation dimensionality. We run SCPSpheresElastic as a 2D slice instead of
# the original 3D volume because `alamo/src/BC/Operator/Elastic/Constant.H`
# reads `AMREX_SPACEDIM` BC entries per edge/corner but the test's `input`
# file only provides 2 entries (correct for 2D, OOB read in 3D). The OOB
# manifests as a segfault on Linux/glibc (heap layout puts a deref-fatal
# pointer at the 3rd slot) and silently runs through on macOS/libc++.
#
# Switching to 2D side-steps the bug entirely (AMREX_SPACEDIM == 2 matches the
# input). Physically, the 2D run is a planar slice of the 3D propellant
# microstructure — same solver, same parallel structure, smaller domain.
# Strong-scaling timings stay informative; absolute wall times don't compare to
# the 3D reference numbers in CLAUDE.md.
#
# If/when the upstream Alamo bug is fixed, switch this back to 3 and re-baseline
# timings against CLAUDE.md's reference table.
dim = 2
# Simulated time per rep.
#
# The on-disk `tests/SCPSpheresElastic/input` runs to 0.11 s of simulated time.
# At 2D, a single step is much faster than the 3D reference in CLAUDE.md.
# Re-baseline with `validate.toml` before adjusting this — the previous 3D
# reference at `0.0003_s` (~7 h overall SCP wall on M1 Pro) is no longer
# applicable. As an initial conservative guess, leave this at the 3D value;
# `validate.toml` will surface the actual 2D timings.
stop_time = "0.0003_s"

[benchmarks.render]
codecs = ["gifski", "av1", "h265"]
frame_resolution = [1920, 1080]
fps = 30
