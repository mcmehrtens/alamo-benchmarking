# Validation configuration.
#
# Runs every benchmark once on a real Alamo build and real telemetry pipeline.
# Use this before kicking off the full overnight `default.toml` run on a new
# machine — it exercises the cold-cache compile flow, the SCP MPI invocation
# (with the binary you just built), the regression suite, and the
# powermetrics/turbostat sidecar end-to-end.
#
# Expected duration: ~15-30 minutes on an M1 Pro / M4 Pro, longer on the Xeons
# depending on how `make test` performs there.

[run]
mode = "validate"
output_dir = "results"
random_seed = 0

[statistics]
warmup_reps = 0
reps_short = 1
reps_long = 1
reps_noise_floor = 3
cooldown_seconds = 2

[preflight]
require_ac = false
require_governor = "any"
require_macos_perf_mode = false
max_load_1min = 4.0
min_disk_free_gb = 5
max_uptime_days = 365

[alamo]
build_target = "tests/SCPSpheresElastic/input"
compiler = "clang++"
dims = [2]                     # 2D only — scp_elastic runs in 2D (see [benchmarks.scp_elastic])

[telemetry]
sample_interval_seconds = 1
require_sudo = true            # exercise the real powermetrics / turbostat path

[benchmarks]
# Compile first so the alamo binary exists before scp_elastic runs.
# regression_suite (`./scripts/runtests.py`) is skipped here because it can
# take 30+ min on its own and requires both 2D and 3D binaries; flip it on
# once everything else is green.
enabled = [
    "noise_floor",
    "compile_serial",
    "compile_parallel",
    "scp_elastic",
    "render_frames",
    "render_encode",
]

[benchmarks.scp_elastic]
# Validate at 1/10 of default's stop_time so the SCP sweep runs in ~5 min on
# the slowest expected box (rowlf, Xeon E3-1240v6) while still exercising
# enough timesteps for real strong-scaling shape to show up in the per-np
# timings (per-rep wall lands ~1–2 min on rowlf, ~10–30 s on faster boxes).
# The point here is to (1) verify the pipeline end-to-end (binding flags,
# telemetry sidecar, hash, affinity parse) and (2) confirm the rough scaling
# shape matches expectations on a new box before committing to the overnight
# default.toml.
stop_time = "0.002_s"
extra_core_counts = []          # rely on the topology auto-sweep
dim = 2                         # 2D — see default.toml for the rationale

[benchmarks.render]
codecs = ["gifski"]
frame_resolution = [640, 360]
fps = 15
